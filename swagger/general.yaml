openapi: 3.1.0
info:
  title: NodeJS Social API
  description: |
    API documentation cho ứng dụng mạng xã hội NodeJS Social (clean architecture: `src/presentation/http`, use case trong `src/modules/*/application`).

    **Base path:** mọi route (trừ tài liệu) nằm dưới prefix `/api` (ví dụ đăng nhập: `POST /api/auth/login`).
    **Swagger UI:** `/api/docs`.

    **Auth:** `Authorization: Bearer <accessToken>`. Refresh token chỉ qua cookie httpOnly `refreshToken` — làm mới access: `GET /api/auth/refresh-token` (không body).

    **Chuẩn Response:**
    - Success: `{ message, statusCode, data? }` — `SuccessResponse`
    - Lỗi: `{ message, errors }` — `ErrorResponse`
    - Phân trang cursor (feed, tìm kiếm, bạn bè, …): `data: { items, nextCursor }`
    - Phân trang trang (ví dụ danh sách block): `data: { data, page, limit, totalItems, totalPages, hasNext, hasPrev }`
  version: 1.0.0
  contact:
    email: support@nodejs-social.com
servers:
  - url: http://localhost:8080/api
    description: Development server (PORT theo biến môi trường, mặc định thường 8080)
  - url: https://api.nodejs-social.com/api
    description: Production server
paths: {}
