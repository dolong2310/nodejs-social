components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access Token (JWT)
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API key credential for routes protected by ApiKeyGuard.
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refreshToken
      description: HttpOnly cookie — server set khi login / refresh / OAuth Google; không có trong JSON response.
