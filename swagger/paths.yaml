        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendsUsersPaginatedResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [blocks]
      summary: Chặn user (xóa bạn bè + lời mời liên quan)
      operationId: blockUser
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockUserBody'
      responses:
        '201':
          description: Đã chặn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockCreatedResponse'
        '400':
          description: Không thể chặn chính mình
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Đã tồn tại block giữa hai user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /blocks/{userId}:
    delete:
      tags: [blocks]
      summary: Bỏ chặn user
      operationId: unblockUser
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không có block active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== SEARCH ====================
  /search:
    get:
      tags: [search]
      summary: Tìm kiếm
      description: Query `query` là tùy chọn (mặc định rỗng). Bearer tùy chọn — có token thì lọc theo ngữ cảnh user.
      operationId: search
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [post, user, image, video, video-stream]
        - name: people
          in: query
          schema:
            type: string
            enum: [friends, not_friends, only_me]
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Thành công — `data.items` + `data.nextCursor` (bài viết hoặc user tùy `type`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchCursorSuccessResponse'

  # ==================== CHATS (Phase 4) ====================
  /conversations/direct:
    post:
      tags: [conversations]
      summary: Mở hoặc tạo chat trực tiếp với bạn (peerUserId)
      operationId: createDirectChat
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [peerUserId]
              properties:
                peerUserId: { $ref: '#/components/schemas/MongoId' }
      responses:
        '201':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSuccessResponse'
  /conversations/groups:
    post:
      tags: [conversations]
      summary: Tạo nhóm chat (creator = admin; memberIds là bạn của creator)
      operationId: createGroupChat
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memberIds]
              properties:
                name: { type: string }
                memberIds:
                  type: array
                  items: { $ref: '#/components/schemas/MongoId' }
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSuccessResponse'
  /conversations:
    get:
      tags: [conversations]
      summary: Danh sách hội thoại (cursor + limit)
      operationId: listChats
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatListSuccessResponse'
  /conversations/{conversationId}:
    get:
      tags: [conversations]
      summary: Chi tiết chat + members
      operationId: getChatDetail
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailSuccessResponse'
    patch:
      tags: [conversations]
      summary: Đổi tên / avatar (admin hoặc manager)
      operationId: patchChat
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                avatarMediaId: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSuccessResponse'
  /conversations/{conversationId}/messages:
    get:
      tags: [conversations]
      summary: Lịch sử tin nhắn (cursor, sort mới nhất trước)
      operationId: listChatMessages
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
        - name: limit
          in: query
          schema: { type: integer, default: 30 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessagesPageSuccessResponse'
    post:
      tags: [conversations]
      summary: Gửi tin (text và/hoặc attachments; tối đa 5MB mỗi file)
      operationId: sendChatMessage
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string }
                attachments:
                  type: array
                  items:
                    $ref: '#/components/schemas/ChatAttachment'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageSuccessResponse'
  /conversations/{conversationId}/read:
    patch:
      tags: [conversations]
      summary: Đánh dấu đã đọc (lastReadMessageId tùy chọn — mặc định tin mới nhất)
      operationId: markChatRead
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lastReadMessageId: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: OK
  /conversations/{conversationId}/members:
    post:
      tags: [conversations]
      summary: Mời thành viên (nhóm)
      operationId: inviteChatMember
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
