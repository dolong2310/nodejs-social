      description: Chỉ **ADMIN**.
      operationId: getPermission
      security: [{ bearerAuth: [] }]
      parameters:
        - name: permissionId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionItemSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [permissions]
      summary: Cập nhật permission
      description: Chỉ **ADMIN**. Nếu đổi `path`/`method` thì cặp mới phải chưa tồn tại (409).
      operationId: updatePermission
      security: [{ bearerAuth: [] }]
      parameters:
        - name: permissionId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionRequest'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionItemSuccessResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cặp path+method mới trùng permission khác
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [permissions]
      summary: Xóa permission
      description: Chỉ **ADMIN**. Không xóa nếu còn role nào gán (409) — cần gỡ khỏi role trước.
      operationId: deletePermission
      security: [{ bearerAuth: [] }]
      parameters:
        - name: permissionId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Đã xóa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Permission đang được gán cho ít nhất một role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== STATIC ====================
  /static/images/{filename}:
    get:
      tags: [static]
      summary: Lấy ảnh tĩnh
      operationId: getStaticImage
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File ảnh
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: Không tìm thấy file
  /static/videos-stream/{filename}:
    get:
      tags: [static]
      summary: Stream video (hỗ trợ Range)
      operationId: getStaticVideoStream
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
        - name: Range
          in: header
          description: bytes=start-
          schema:
            type: string
      responses:
        '206':
          description: Partial content
        '404':
          description: Không tìm thấy file
  /static/videos-stream/{id}/master.m3u8:
    get:
      tags: [static]
      summary: Lấy Stream master playlist
      operationId: getStaticVideoStreamMaster
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stream master playlist
        '404':
          description: Không tìm thấy
  /static/videos-stream/{id}/{version}/{segment}:
    get:
      tags: [static]
      summary: Lấy Stream segment
      operationId: getStaticVideoStreamSegment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
        - name: segment
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stream segment
        '404':
          description: Không tìm thấy
