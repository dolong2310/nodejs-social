      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailSuccessResponse'
  /conversations/{conversationId}/members/me:
    delete:
      tags: [conversations]
      summary: Rời nhóm / chat
      operationId: leaveChat
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: OK
  /conversations/{conversationId}/members/{userId}:
    delete:
      tags: [conversations]
      summary: Kick thành viên (theo quyền admin/manager)
      operationId: kickChatMember
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
        - name: userId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: OK
  /conversations/{conversationId}/members/{userId}/role:
    patch:
      tags: [conversations]
      summary: Đổi role manager ↔ member (chỉ admin)
      operationId: patchChatMemberRole
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
        - name: userId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [manager, member] }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailSuccessResponse'
  /conversations/{conversationId}/admin/transfer:
    post:
      tags: [conversations]
      summary: Chuyển admin (admin cũ thành manager)
      operationId: transferChatAdmin
      security: [{ bearerAuth: [] }]
      parameters:
