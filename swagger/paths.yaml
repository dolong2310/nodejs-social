        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== ROLES & PERMISSIONS (admin) ====================
  /roles:
    get:
      tags: [roles]
      summary: Danh sách role
      description: Chỉ **ADMIN** (so khớp `roleId` với role hệ thống). Phân trang `page` + `limit` (1–100).
      operationId: listRoles
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Thành công — cùng dạng phân trang với `GET /blocks` (`data.data` là mảng role)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListPageSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [roles]
      summary: Tạo role
      description: Chỉ **ADMIN**. Tên `name` phải duy nhất; trùng tên trả 409.
      operationId: createRole
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Đã tạo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleItemSuccessResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Tên role đã tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /roles/{roleId}:
    get:
      tags: [roles]
      summary: Chi tiết role
      description: Chỉ **ADMIN**.
      operationId: getRole
      security: [{ bearerAuth: [] }]
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleItemSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [roles]
      summary: Cập nhật role
      description: Chỉ **ADMIN**. Không đổi tên/xóa role hệ thống ADMIN/USER; trùng tên → 409.
      operationId: updateRole
      security: [{ bearerAuth: [] }]
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleItemSuccessResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải admin hoặc thao tác bị từ chối (role hệ thống)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Tên mới trùng role khác
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [roles]
      summary: Xóa role
      description: Chỉ **ADMIN**. Không xóa role hệ thống ADMIN/USER.
      operationId: deleteRole
      security: [{ bearerAuth: [] }]
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Đã xóa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải admin hoặc không thể xóa role hệ thống
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /permissions:
    get:
      tags: [permissions]
      summary: Danh sách permission
      description: Chỉ **ADMIN**. Phân trang `page` + `limit` (1–100).
      operationId: listPermissions
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionListPageSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [permissions]
      summary: Tạo permission
      description: Chỉ **ADMIN**. Cặp `path` + `method` phải duy nhất; trùng → 409.
      operationId: createPermission
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePermissionRequest'
      responses:
        '201':
          description: Đã tạo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionItemSuccessResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Đã tồn tại permission cùng path và method
          content:
            application/json:
