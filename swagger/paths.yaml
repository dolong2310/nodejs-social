      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items: { $ref: '#/components/schemas/MongoId' }
                  description: Bỏ trống hoặc không gửi = mark all
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
