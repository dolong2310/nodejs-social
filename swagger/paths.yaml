paths:
  # ==================== AUTH ====================
  /auth/register:
    post:
      tags: [auth]
      summary: Đăng ký tài khoản
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags: [auth]
      summary: Đăng nhập
      operationId: login
      description: Trả về `accessToken` trong JSON; `refreshToken` được set qua header `Set-Cookie` (httpOnly).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Đăng nhập thành công (kèm Set-Cookie refreshToken)
          headers:
            Set-Cookie:
              schema:
                type: string
                example: refreshToken=...; Path=/; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Email hoặc mật khẩu không đúng
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags: [auth]
      summary: Đăng xuất
      operationId: logout
      description: Cần Bearer access token và cookie `refreshToken`. Body không dùng.
      security:
        - bearerAuth: []
          refreshTokenCookie: []
      responses:
        '200':
          description: Đăng xuất thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh-token:
    get:
      tags: [auth]
      summary: Làm mới access token
      operationId: refreshToken
      description: |
        Đọc refresh từ cookie httpOnly; trả về `accessToken` trong body; refresh mới được set lại qua Set-Cookie.
        Gọi với `credentials: include` (CORS). **Method: GET** — không có body.
      security:
        - refreshTokenCookie: []
      responses:
        '200':
          description: Làm mới token thành công (kèm Set-Cookie refreshToken mới)
          headers:
            Set-Cookie:
              schema:
                type: string
                example: refreshToken=...; Path=/; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /auth/forgot-password:
    post:
      tags: [auth]
      summary: Quên mật khẩu
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Đã gửi email đặt lại mật khẩu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Email không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== USERS ====================
  /users/me:
    get:
      tags: [users]
      summary: Lấy thông tin user hiện tại
      operationId: getMe
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [users]
      summary: Cập nhật thông tin user
      operationId: updateMe
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{username}:
    get:
      tags: [users]
      summary: Lấy thông tin user theo username
      operationId: getUserProfile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '404':
          description: Không tìm thấy user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/change-password:
    put:
      tags: [users]
      summary: Đổi mật khẩu (user đã đăng nhập, đã verify)
      operationId: changePassword
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Đổi mật khẩu thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== OAUTH ====================
  /oauth/google/url:
    get:
      tags: [oauth]
      summary: Lấy URL ủy quyền Google (PKCE/state)
      operationId: getGoogleAuthUrl
      parameters:
        - name: ip
          in: query
          required: true
          schema: { type: string }
        - name: userAgent
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: URL đăng nhập Google
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthUrlSuccessResponse'
  /oauth/google:
    get:
      tags: [oauth]
      summary: Đăng nhập bằng Google
      operationId: googleLogin
      description: |
        Callback OAuth (query `code`): server tạo session, set cookie `refreshToken` (httpOnly), redirect `302` tới `{FRONTEND_URL}/oauth/callback`.
        Client cần gọi `POST /auth/refresh-token` với cookie (credentials) để lấy `accessToken` trong JSON.
      responses:
        '302':
          description: Redirect tới frontend sau khi set cookie; hoặc redirect tới Google khi bắt đầu flow (tùy triển khai client)

  # ==================== MEDIA ====================
  /media/upload-image:
    post:
      tags: [media]
      summary: Upload ảnh
      operationId: uploadImage
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /media/upload-video:
    post:
      tags: [media]
      summary: Upload video
      operationId: uploadVideo
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                video:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /media/upload-video-stream:
    post:
      tags: [media]
      summary: Upload video Stream
      operationId: uploadVideoStream
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                video:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /media/video-status/{id}:
    get:
      tags: [media]
      summary: Lấy trạng thái upload/encode video
      operationId: getVideoStatus
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoStatusResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== POSTS ====================
  /posts:
    get:
      tags: [posts]
      summary: Lấy new feed
      description: Bearer tùy chọn — có token thì feed merged (public + bạn bè + bài của mình), có block filter; không token thì chỉ public. User chưa verify vẫn đọc được khi gửi token. Phân trang **cursor** (`limit` bắt buộc trong validation, 1–100).
      operationId: getNewFeeds
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: cursor
          in: query
          required: false
          description: Opaque cursor (lần sau gửi lại để lấy trang tiếp theo)
          schema:
            type: string
      responses:
        '200':
          description: Thành công — `data.items` + `data.nextCursor`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostFeedCursorSuccessResponse'
    post:
      tags: [posts]
      summary: Tạo bài viết mới
      operationId: createPost
      security: [{ bearerAuth: [] }]
      description: Yêu cầu Bearer token; user phải đã verify email (middleware tương ứng khi gửi Authorization).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Tạo bài viết thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /posts/{postId}:
    get:
      tags: [posts]
      summary: Lấy chi tiết bài viết
      operationId: getPostDetail
      description: Bearer tùy chọn; khách chỉ xem public.
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetailSuccessResponse'
        '401':
          description: Token không hợp lệ (khi gửi Authorization)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không đủ quyền xem (audience, block, v.v.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy bài viết
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [posts]
      summary: Chủ bài cập nhật audience và allowStrangerComments
      operationId: patchPost
      security: [{ bearerAuth: [] }]
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchPostRequest'
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải chủ bài hoặc chưa verify
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy bài viết
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /posts/{type}/{postId}:
    get:
      tags: [posts]
      summary: Lấy danh sách bài viết theo loại (comments, quotes, reposts)
      operationId: getPostsType
      description: Bearer tùy chọn; quyền xem theo audience của bài cha.
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [post, repost, comment, quote]
        - name: postId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Thành công — `data.items` + `data.nextCursor`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostFeedCursorSuccessResponse'
        '401':
          description: Token không hợp lệ (khi gửi Authorization)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không đủ quyền xem bài cha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== BOOKMARKS ====================
  /bookmarks:
    post:
      tags: [bookmarks]
      summary: Thêm bookmark bài viết
      operationId: createBookmark
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookmarkRequest'
      responses:
        '201':
          description: Thêm bookmark thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookmarkSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /bookmarks/posts/{postId}:
    delete:
      tags: [bookmarks]
      summary: Xóa bookmark bài viết
      operationId: deleteBookmark
      security: [{ bearerAuth: [] }]
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Xóa bookmark thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== LIKES ====================
  /likes:
    post:
      tags: [likes]
      summary: Thích bài viết
      operationId: createLike
      security: [{ bearerAuth: [] }]
      description: Cần tài khoản đã verify; áp dụng cùng quy tắc hiển thị bài như bookmark.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLikeRequest'
      responses:
        '201':
          description: Like thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Chưa verify hoặc không được xem bài
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /likes/posts/{postId}:
    delete:
      tags: [likes]
      summary: Bỏ like bài viết
      operationId: deleteLike
      security: [{ bearerAuth: [] }]
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bỏ like thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== FRIENDS ====================
  /friends:
    get:
      tags: [friends]
      summary: Danh sách bạn bè
      operationId: listFriends
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Thành công — `data.items` (FriendUserSummary) + `data.nextCursor`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendListCursorSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests:
    post:
      tags: [friends]
      summary: Gửi lời mời kết bạn
      operationId: sendFriendRequest
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendFriendRequestBody'
      responses:
        '201':
          description: Đã gửi lời mời
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestCreatedResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Bị chặn hoặc không được phép
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Đã là bạn hoặc đã có lời mời chờ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Vượt giới hạn 100 lời mời gửi đi mỗi ngày theo lịch UTC (D-07)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests/incoming:
    get:
      tags: [friends]
      summary: Lời mời đến
      operationId: listIncomingFriendRequests
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Thành công — cursor pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendListCursorSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests/outgoing:
    get:
      tags: [friends]
      summary: Lời mời đã gửi
      operationId: listOutgoingFriendRequests
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Thành công — cursor pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendListCursorSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests/{fromUserId}/accept:
    post:
      tags: [friends]
      summary: Chấp nhận lời mời
      operationId: acceptFriendRequest
      security: [{ bearerAuth: [] }]
      parameters:
        - name: fromUserId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Bị chặn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không có lời mời chờ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests/{fromUserId}/decline:
    post:
      tags: [friends]
      summary: Từ chối lời mời
      operationId: declineFriendRequest
      security: [{ bearerAuth: [] }]
      parameters:
        - name: fromUserId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không có lời mời chờ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests/outgoing/{toUserId}:
    delete:
      tags: [friends]
      summary: Thu hồi lời mời đã gửi
      operationId: revokeOutgoingFriendRequest
      security: [{ bearerAuth: [] }]
