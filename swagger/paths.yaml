paths:
  # ==================== AUTH ====================
  /auth/register:
    post:
      tags: [auth]
      summary: Đăng ký tài khoản
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags: [auth]
      summary: Đăng nhập
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Email hoặc mật khẩu không đúng
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags: [auth]
      summary: Đăng xuất
      operationId: logout
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Đăng xuất thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh-token:
    post:
      tags: [auth]
      summary: Làm mới access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Làm mới token thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /auth/verify-email:
    post:
      tags: [auth]
      summary: Xác thực email
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Xác thực email thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Token không hợp lệ hoặc đã xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/resend-verify-email:
    post:
      tags: [auth]
      summary: Gửi lại email xác thực
      operationId: resendVerifyEmail
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Đã gửi email xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Email đã được xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/forgot-password:
    post:
      tags: [auth]
      summary: Quên mật khẩu
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Đã gửi email đặt lại mật khẩu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Email không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/reset-password:
    post:
      tags: [auth]
      summary: Đặt lại mật khẩu
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Đặt lại mật khẩu thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Token không hợp lệ hoặc mật khẩu không khớp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/change-password:
    put:
      tags: [auth]
      summary: Đổi mật khẩu
      operationId: changePassword
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Đổi mật khẩu thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== USERS ====================
  /users/me:
    get:
      tags: [users]
      summary: Lấy thông tin user hiện tại
      operationId: getMe
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [users]
      summary: Cập nhật thông tin user
      operationId: updateMe
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{username}:
    get:
      tags: [users]
      summary: Lấy thông tin user theo username
      operationId: getUserProfile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessResponse'
        '404':
          description: Không tìm thấy user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== OAUTH ====================
  /oauth/google:
    get:
      tags: [oauth]
      summary: Đăng nhập bằng Google
      operationId: googleLogin
      description: Chuyển hướng đến trang đăng nhập Google OAuth
      responses:
        '302':
          description: Redirect đến Google OAuth

  # ==================== MEDIA ====================
  /media/upload-image:
    post:
      tags: [media]
      summary: Upload ảnh
      operationId: uploadImage
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /media/upload-video:
    post:
      tags: [media]
      summary: Upload video
      operationId: uploadVideo
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                video:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /media/upload-video-hls:
    post:
      tags: [media]
      summary: Upload video HLS
      operationId: uploadVideoHLS
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                video:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /media/video-status/{id}:
    get:
      tags: [media]
      summary: Lấy trạng thái upload/encode video
      operationId: getVideoStatus
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoStatusResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== POSTS ====================
  /posts:
    get:
      tags: [posts]
      summary: Lấy new feed
      description: Bearer tùy chọn — có token thì feed merged (public + bạn bè + bài của mình), có block filter; không token thì chỉ public. User chưa verify vẫn đọc được khi gửi token.
      operationId: getNewFeeds
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostsPaginatedResponse'
    post:
      tags: [posts]
      summary: Tạo bài viết mới
      operationId: createPost
      security: [{ bearerAuth: [] }]
      description: Yêu cầu Bearer token; user phải đã verify email (middleware tương ứng khi gửi Authorization).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Tạo bài viết thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /posts/{postId}:
    get:
      tags: [posts]
      summary: Lấy chi tiết bài viết
      operationId: getPostDetail
      description: Bearer tùy chọn; khách chỉ xem public.
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetailSuccessResponse'
        '401':
          description: Token không hợp lệ (khi gửi Authorization)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không đủ quyền xem (audience, block, v.v.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy bài viết
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [posts]
      summary: Chủ bài cập nhật audience và allowStrangerComments
      operationId: patchPost
      security: [{ bearerAuth: [] }]
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchPostRequest'
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không phải chủ bài hoặc chưa verify
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy bài viết
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /posts/{type}/{postId}:
    get:
      tags: [posts]
      summary: Lấy danh sách bài viết theo loại (comments, quotes, reposts)
      operationId: getPostsType
      description: Bearer tùy chọn; quyền xem theo audience của bài cha.
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [post, repost, comment, quote]
        - name: postId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostsPaginatedResponse'
        '401':
          description: Token không hợp lệ (khi gửi Authorization)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không đủ quyền xem bài cha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không tìm thấy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== BOOKMARKS ====================
  /bookmarks:
    post:
      tags: [bookmarks]
      summary: Thêm bookmark bài viết
      operationId: createBookmark
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookmarkRequest'
      responses:
        '201':
          description: Thêm bookmark thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookmarkSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /bookmarks/posts/{postId}:
    delete:
      tags: [bookmarks]
      summary: Xóa bookmark bài viết
      operationId: deleteBookmark
      security: [{ bearerAuth: [] }]
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Xóa bookmark thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== LIKES ====================
  /likes:
    post:
      tags: [likes]
      summary: Thích bài viết
      operationId: createLike
      security: [{ bearerAuth: [] }]
      description: Cần tài khoản đã verify; áp dụng cùng quy tắc hiển thị bài như bookmark.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLikeRequest'
      responses:
        '201':
          description: Like thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeSuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Chưa verify hoặc không được xem bài
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /likes/posts/{postId}:
    delete:
      tags: [likes]
      summary: Bỏ like bài viết
      operationId: deleteLike
      security: [{ bearerAuth: [] }]
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bỏ like thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== FRIENDS ====================
  /friends:
    get:
      tags: [friends]
      summary: Danh sách bạn bè
      operationId: listFriends
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendsUsersPaginatedResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests:
    post:
      tags: [friends]
      summary: Gửi lời mời kết bạn
      operationId: sendFriendRequest
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendFriendRequestBody'
      responses:
        '201':
          description: Đã gửi lời mời
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequestCreatedResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Bị chặn hoặc không được phép
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Đã là bạn hoặc đã có lời mời chờ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Vượt giới hạn 100 lời mời gửi đi mỗi ngày theo lịch UTC (D-07)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests/incoming:
    get:
      tags: [friends]
      summary: Lời mời đến
      operationId: listIncomingFriendRequests
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendsUsersPaginatedResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests/outgoing:
    get:
      tags: [friends]
      summary: Lời mời đã gửi
      operationId: listOutgoingFriendRequests
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendsUsersPaginatedResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests/{fromUserId}/accept:
    post:
      tags: [friends]
      summary: Chấp nhận lời mời
      operationId: acceptFriendRequest
      security: [{ bearerAuth: [] }]
      parameters:
        - name: fromUserId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Bị chặn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không có lời mời chờ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests/{fromUserId}/decline:
    post:
      tags: [friends]
      summary: Từ chối lời mời
      operationId: declineFriendRequest
      security: [{ bearerAuth: [] }]
      parameters:
        - name: fromUserId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không có lời mời chờ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/requests/outgoing/{toUserId}:
    delete:
      tags: [friends]
      summary: Thu hồi lời mời đã gửi
      operationId: revokeOutgoingFriendRequest
      security: [{ bearerAuth: [] }]
      parameters:
        - name: toUserId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không có lời mời chờ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /friends/{userId}:
    delete:
      tags: [friends]
      summary: Hủy kết bạn
      operationId: unfriendUser
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không phải bạn bè
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== BLOCKS ====================
  /blocks:
    get:
      tags: [blocks]
      summary: Danh sách user đã chặn
      operationId: listBlockedUsers
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendsUsersPaginatedResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [blocks]
      summary: Chặn user (xóa bạn bè + lời mời liên quan)
      operationId: blockUser
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockUserBody'
      responses:
        '201':
          description: Đã chặn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockCreatedResponse'
        '400':
          description: Không thể chặn chính mình
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Đã tồn tại block giữa hai user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /blocks/{userId}:
    delete:
      tags: [blocks]
      summary: Bỏ chặn user
      operationId: unblockUser
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/MongoId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Không có block active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== SEARCH ====================
  /search:
    get:
      tags: [search]
      summary: Tìm kiếm
      description: Query `query` là tùy chọn (mặc định rỗng). Bearer tùy chọn — có token thì lọc theo ngữ cảnh user.
      operationId: search
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [post, user, image, video, video-hls]
        - name: people_follow
          in: query
          schema:
            type: string
            enum: [following, not_following, only_me]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchPaginatedResponse'

  # ==================== CHATS (Phase 4) ====================
  /conversations/direct:
    post:
      tags: [conversations]
      summary: Mở hoặc tạo chat trực tiếp với bạn (peerUserId)
      operationId: createDirectChat
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [peerUserId]
              properties:
                peerUserId: { $ref: '#/components/schemas/MongoId' }
      responses:
        '201':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSuccessResponse'
  /conversations/groups:
    post:
      tags: [conversations]
      summary: Tạo nhóm chat (creator = admin; memberIds là bạn của creator)
      operationId: createGroupChat
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memberIds]
              properties:
                name: { type: string }
                memberIds:
                  type: array
                  items: { $ref: '#/components/schemas/MongoId' }
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSuccessResponse'
  /conversations:
    get:
      tags: [conversations]
      summary: Danh sách hội thoại (cursor + limit)
      operationId: listChats
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatListSuccessResponse'
  /conversations/{conversationId}:
    get:
      tags: [conversations]
      summary: Chi tiết chat + members
      operationId: getChatDetail
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailSuccessResponse'
    patch:
      tags: [conversations]
      summary: Đổi tên / avatar (admin hoặc manager)
      operationId: patchChat
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                avatarMediaId: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSuccessResponse'
  /conversations/{conversationId}/messages:
    get:
      tags: [conversations]
      summary: Lịch sử tin nhắn (cursor, sort mới nhất trước)
      operationId: listChatMessages
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
        - name: limit
          in: query
          schema: { type: integer, default: 30 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessagesPageSuccessResponse'
    post:
      tags: [conversations]
      summary: Gửi tin (text và/hoặc attachments; tối đa 5MB mỗi file)
      operationId: sendChatMessage
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string }
                attachments:
                  type: array
                  items:
                    $ref: '#/components/schemas/ChatAttachment'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageSuccessResponse'
  /conversations/{conversationId}/read:
    patch:
      tags: [conversations]
      summary: Đánh dấu đã đọc (lastReadMessageId tùy chọn — mặc định tin mới nhất)
      operationId: markChatRead
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lastReadMessageId: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: OK
  /conversations/{conversationId}/members:
    post:
      tags: [conversations]
      summary: Mời thành viên (nhóm)
      operationId: inviteChatMember
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailSuccessResponse'
  /conversations/{conversationId}/members/me:
    delete:
      tags: [conversations]
      summary: Rời nhóm / chat
      operationId: leaveChat
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: OK
  /conversations/{conversationId}/members/{userId}:
    delete:
      tags: [conversations]
      summary: Kick thành viên (theo quyền admin/manager)
      operationId: kickChatMember
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
        - name: userId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          description: OK
  /conversations/{conversationId}/members/{userId}/role:
    patch:
      tags: [conversations]
      summary: Đổi role manager ↔ member (chỉ admin)
      operationId: patchChatMemberRole
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
        - name: userId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [manager, member] }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailSuccessResponse'
  /conversations/{conversationId}/admin/transfer:
    post:
      tags: [conversations]
      summary: Chuyển admin (admin cũ thành manager)
      operationId: transferChatAdmin
      security: [{ bearerAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newAdminUserId]
              properties:
                newAdminUserId: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailSuccessResponse'

  # ==================== NOTIFICATIONS ====================
  /notifications:
    get:
      tags: [notifications]
      summary: Danh sách thông báo (cursor, optional unreadOnly)
      operationId: listNotifications
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: cursor
          in: query
          schema: { type: string }
        - name: unreadOnly
          in: query
          description: 'true | false — lọc chỉ chưa đọc'
          schema: { type: string, enum: ['true', 'false', '1', '0'] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationsPageSuccessResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /notifications/read:
    patch:
      tags: [notifications]
      summary: Đánh dấu đã đọc (batch hoặc tất cả)
      operationId: markNotificationsRead
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items: { $ref: '#/components/schemas/MongoId' }
                  description: Bỏ trống hoặc không gửi = mark all
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /notifications/{notificationId}/read:
    patch:
      tags: [notifications]
      summary: Đánh dấu một thông báo đã đọc
      operationId: markOneNotificationRead
      security: [{ bearerAuth: [] }]
      parameters:
        - name: notificationId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/MongoId' }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== STATIC ====================
  /static/images/{filename}:
    get:
      tags: [static]
      summary: Lấy ảnh tĩnh
      operationId: getStaticImage
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File ảnh
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: Không tìm thấy file
  /static/videos-stream/{filename}:
    get:
      tags: [static]
      summary: Stream video (hỗ trợ Range)
      operationId: getStaticVideoStream
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
        - name: Range
          in: header
          description: bytes=start-
          schema:
            type: string
      responses:
        '206':
          description: Partial content
        '404':
          description: Không tìm thấy file
  /static/videos-hls/{id}/master.m3u8:
    get:
      tags: [static]
      summary: Lấy HLS master playlist
      operationId: getStaticVideoHLSMaster
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS master playlist
        '404':
          description: Không tìm thấy
  /static/videos-hls/{id}/{version}/{segment}:
    get:
      tags: [static]
      summary: Lấy HLS segment
      operationId: getStaticVideoHLSSegment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
        - name: segment
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS segment
        '404':
          description: Không tìm thấy
