tags:
  - name: auth
    description: Đăng ký, đăng nhập, logout, GET refresh-token (cookie), quên mật khẩu — refresh qua cookie httpOnly
  - name: users
    description: Profile — GET/PATCH /users/me, GET /users/:username, PUT /users/change-password
  - name: oauth
    description: Google OAuth — GET `/oauth/google/url`, GET `/oauth/google` (callback + Set-Cookie + redirect frontend)
  - name: media
    description: Upload và quản lý media (ảnh, video)
  - name: posts
    description: Quản lý bài viết, feed, comments
  - name: bookmarks
    description: Quản lý bookmark bài viết
  - name: likes
    description: Like / bỏ like bài viết (cần verify, kiểm tra quyền xem bài)
  - name: friends
    description: Kết bạn — lời mời, chấp nhận/từ chối, danh sách bạn, hủy kết bạn
  - name: blocks
    description: Chặn / bỏ chặn — tự động gỡ bạn và xóa lời mời liên quan
  - name: search
    description: Tìm kiếm bài viết, người dùng
  - name: conversations
    description: Conversations HTTP (Mongo chat DB) — direct/group, tin nhắn, đã đọc
  - name: notifications
    description: Hộp thông báo in-app (social DB) — list cursor, đánh dấu đã đọc
  - name: roles
    description: Vai trò hệ thống (ADMIN, USER) — chỉ tài khoản admin; danh sách + permissionIds
  - name: permissions
    description: Bản ghi quyền theo path/method (seed từ route) — chỉ admin
  - name: static
    description: Phục vụ file tĩnh (ảnh, video)
